<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Today</title>
  <link rel="stylesheet" href="style/popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <img src="assets/icon.svg" class="logo" alt="Water drop" />
        <h1>Water Today</h1>
      </div>
      <button class="icon-btn" id="settingsToggle" title="Settings" aria-label="Open settings" type="button">
        <svg class="icon-btn__icon icon-btn__icon--open" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.14 12.94c.04-.31.06-.62.06-.94s-.02-.63-.06-.94l2.03-1.58a.75.75 0 0 0 .18-.95l-1.92-3.32a.75.75 0 0 0-.91-.33l-2.39.96a7.08 7.08 0 0 0-1.62-.94l-.36-2.54A.75.75 0 0 0 12.42 1h-3.84a.75.75 0 0 0-.74.64l-.36 2.54c-.57.21-1.1.51-1.62.94l-2.39-.96a.75.75 0 0 0-.91.33L.64 7.81a.75.75 0 0 0 .18.95l2.03 1.58c-.04.31-.06.62-.06.94s.02.63.06.94L.82 13.8a.75.75 0 0 0-.18.95l1.92 3.32c.19.33.59.47.91.33l2.39-.96c.51.42 1.05.76 1.62.94l.36 2.54c.06.36.37.64.74.64h3.84c.37 0 .68-.27.74-.64l.36-2.54c.57-.18 1.1-.52 1.62-.94l2.39.96c.33.13.72 0 .91-.33l1.92-3.32a.75.75 0 0 0-.18-.95l-2.03-1.58ZM10.5 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z" />
        </svg>
        <svg class="icon-btn__icon icon-btn__icon--close" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7a1 1 0 0 0-1.41 1.42L10.59 12l-4.89 4.89a1 1 0 1 0 1.41 1.42L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.42L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4Z" />
        </svg>
      </button>
    </header>

    <!-- Main content -->
    <main class="main">

      <!-- Progress ring -->
      <div class="progress-container">
        <svg class="progress-ring" viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4fc3f7" />
              <stop offset="100%" stop-color="#1565c0" />
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="60" cy="60" r="50" />
          <circle class="ring-fill" id="progressCircle" cx="60" cy="60" r="50" />
        </svg>
        <div class="progress-label">
          <span class="intake-amount" id="intakeAmount">0</span>
          <span class="intake-unit">ml</span>
          <span class="intake-goal" id="goalText">/ 2000 ml</span>
        </div>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-item">
          <span>&#127919;</span>
          <span id="percentText">0% of goal</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span>⏰</span>
          <span id="nextReminder">—</span>
        </div>
      </div>

      <!-- Quick add -->
      <div class="add-section">
        <p class="section-label">Add water</p>
        <div class="quick-btns">
          <button class="quick-btn" data-amount="150">+150<span>ml</span></button>
          <button class="quick-btn" data-amount="250">+250<span>ml</span></button>
          <button class="quick-btn" data-amount="330">+330<span>ml</span></button>
          <button class="quick-btn" data-amount="500">+500<span>ml</span></button>
        </div>
        <div class="custom-row">
          <input type="number" id="customAmount" placeholder="Custom amount…" min="1" max="5000" />
          <button class="add-btn" id="addCustom">Add</button>
        </div>
      </div>

      <!-- Reset -->
      <button class="reset-btn" id="resetBtn">Reset today&#39;s intake</button>

    </main>

    <!-- Settings panel (hidden by default) -->
    <section class="settings-panel" id="settingsPanel" aria-hidden="true">
      <h2>Settings</h2>

      <div class="setting-row">
        <label for="intervalInput">Reminder interval</label>
        <div class="input-group">
          <input type="number" id="intervalInput" min="1" max="480" value="30" />
          <span class="unit-label">min</span>
        </div>
      </div>

      <div class="setting-row">
        <label for="goalInput">Daily goal</label>
        <div class="input-group">
          <input type="number" id="goalInput" min="100" max="10000" step="100" value="2000" />
          <span class="unit-label">ml</span>
        </div>
      </div>

      <div class="setting-row toggle-row">
        <label for="notificationsEnabled">Notifications</label>
        <label class="switch" for="notificationsEnabled">
          <input type="checkbox" id="notificationsEnabled" checked />
          <span class="switch-slider" aria-hidden="true"></span>
        </label>
      </div>

      <div class="setting-row toggle-row">
        <label for="soundsEnabled">Notification sounds</label>
        <label class="switch" for="soundsEnabled">
          <input type="checkbox" id="soundsEnabled" checked />
          <span class="switch-slider" aria-hidden="true"></span>
        </label>
      </div>

      <div class="setting-row toggle-row">
        <label for="keepRemindingAfterGoal">Keep notifying after goal</label>
        <label class="switch" for="keepRemindingAfterGoal">
          <input type="checkbox" id="keepRemindingAfterGoal" checked />
          <span class="switch-slider" aria-hidden="true"></span>
        </label>
      </div>

      <button class="save-btn" id="saveSettings" type="button">
        <svg class="save-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4ZM12 19a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm-4-12V5h6v2H8Z" />
        </svg>
        <span>Save Settings</span>
      </button>
      <p class="save-feedback" id="saveFeedback" aria-live="polite"></p>
    </section>

  </div>

  <script src="scripts/popup.js" type="module"></script>
</body>
</html>
