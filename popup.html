<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Today</title>
  <link rel="stylesheet" href="style/popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <img src="assets/icon.svg" class="logo" alt="Water drop" />
        <h1>Water Today</h1>
      </div>
      <button class="icon-btn" id="settingsToggle" title="Settings" aria-label="Open settings">⚙️</button>
    </header>

    <!-- Main content -->
    <main class="main">

      <!-- Progress ring -->
      <div class="progress-container">
        <svg class="progress-ring" viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4fc3f7" />
              <stop offset="100%" stop-color="#1565c0" />
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="60" cy="60" r="50" />
          <circle class="ring-fill" id="progressCircle" cx="60" cy="60" r="50" />
        </svg>
        <div class="progress-label">
          <span class="intake-amount" id="intakeAmount">0</span>
          <span class="intake-unit">ml</span>
          <span class="intake-goal" id="goalText">/ 2000 ml</span>
        </div>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-item">
          <span>&#127919;</span>
          <span id="percentText">0% of goal</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
          <span>⏰</span>
          <span id="nextReminder">—</span>
        </div>
      </div>

      <!-- Quick add -->
      <div class="add-section">
        <p class="section-label">Add water</p>
        <div class="quick-btns">
          <button class="quick-btn" data-amount="150">+150<span>ml</span></button>
          <button class="quick-btn" data-amount="250">+250<span>ml</span></button>
          <button class="quick-btn" data-amount="330">+330<span>ml</span></button>
          <button class="quick-btn" data-amount="500">+500<span>ml</span></button>
        </div>
        <div class="custom-row">
          <input type="number" id="customAmount" placeholder="Custom amount…" min="1" max="5000" />
          <button class="add-btn" id="addCustom">Add</button>
        </div>
      </div>

      <!-- Reset -->
      <button class="reset-btn" id="resetBtn">Reset today&#39;s intake</button>

    </main>

    <!-- Settings panel (hidden by default) -->
    <section class="settings-panel" id="settingsPanel" aria-hidden="true">
      <h2>Settings</h2>

      <div class="setting-row">
        <label for="intervalInput">Reminder interval</label>
        <div class="input-group">
          <input type="number" id="intervalInput" min="1" max="480" value="30" />
          <span class="unit-label">min</span>
        </div>
      </div>

      <div class="setting-row">
        <label for="goalInput">Daily goal</label>
        <div class="input-group">
          <input type="number" id="goalInput" min="100" max="10000" step="100" value="2000" />
          <span class="unit-label">ml</span>
        </div>
      </div>

      <div class="setting-row toggle-row">
        <label for="notificationsEnabled">Notifications</label>
        <label class="switch" for="notificationsEnabled">
          <input type="checkbox" id="notificationsEnabled" checked />
          <span class="switch-slider" aria-hidden="true"></span>
        </label>
      </div>

      <div class="setting-row toggle-row">
        <label for="soundsEnabled">Notification sounds</label>
        <label class="switch" for="soundsEnabled">
          <input type="checkbox" id="soundsEnabled" checked />
          <span class="switch-slider" aria-hidden="true"></span>
        </label>
      </div>

      <div class="setting-row toggle-row">
        <label for="keepRemindingAfterGoal">Keep notifying after goal</label>
        <label class="switch" for="keepRemindingAfterGoal">
          <input type="checkbox" id="keepRemindingAfterGoal" checked />
          <span class="switch-slider" aria-hidden="true"></span>
        </label>
      </div>

      <button class="save-btn" id="saveSettings">Save Settings</button>
      <p class="save-feedback" id="saveFeedback" aria-live="polite"></p>
    </section>

  </div>

  <script src="scripts/popup.js" type="module"></script>
</body>
</html>
