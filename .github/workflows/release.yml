name: Create Production Release

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0, v2.1.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Optional: If you use Webpack/Vite, add 'npm install' and 'npm run build' here
      
      - name: Zip Extension Assets
        run: |
          # Creates a zip excluding git files and hidden folders
          zip -r water-today-extension.zip . -x "*.git*" ".github/*" "node_modules/*"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: water-today-extension.zip
          name: Release ${{ github.ref_name }}
          body: |
            Automated production build for Water Today extension.
            Version: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}