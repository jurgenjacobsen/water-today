name: Release

on:
  push:
    branches:
      - main

# Fixes the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to 24

      - name: Debug - List Files
        run: ls -R # This shows us if manifest.json and get-version.js exist

      - name: Extract Version from Manifest
        id: get_version
        run: |
          # Ensure the script exists before running
          if [ ! -f "get-version.js" ]; then
            echo "Error: get-version.js not found in root!"
            exit 1
          fi
          VERSION=$(node get-version.js)
          echo "EXTRACTED_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Zip Extension
        run: |
          zip -r "water-today-v${{ steps.get_version.outputs.EXTRACTED_VERSION }}.zip" . -x "*.git*" ".github/*" "node_modules/*" "get-version.js"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.EXTRACTED_VERSION }}
          name: Release v${{ steps.get_version.outputs.EXTRACTED_VERSION }}
          files: "water-today-v${{ steps.get_version.outputs.EXTRACTED_VERSION }}.zip"
          body: "Automated build for version ${{ steps.get_version.outputs.EXTRACTED_VERSION }}"
          # This prevents failing if the release already exists
          make_latest: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}