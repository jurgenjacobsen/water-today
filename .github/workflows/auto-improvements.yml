name: Auto Improvements

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  safe-autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply safe maintenance updates
        run: |
          npm audit fix --package-lock-only || true
          npm update --package-lock-only || true

      - name: Ensure project still builds
        run: |
          npm ci
          npm run build

      - name: Create pull request for updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: automated maintenance updates"
          branch: "bot/auto-improvements"
          delete-branch: true
          title: "chore: automated maintenance updates"
          body: |
            Automated maintenance pull request generated by GitHub Actions.

            Included updates:
            - npm audit fixes applied to lockfile when available
            - npm package lock maintenance updates

            Validation run:
            - npm run build
          labels: |
            automated
            dependencies
            maintenance
