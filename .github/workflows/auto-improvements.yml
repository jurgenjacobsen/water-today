name: Auto Improvements

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  safe-autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply safe maintenance updates
        run: |
          npm audit fix --package-lock-only || true
          npm update --package-lock-only || true

      - name: Run AI Auto-Improvement
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY secret is missing. Skipping AI Auto-Improvement."
          else
            node automation/ai-improve.js
          fi

      - name: Ensure project still builds
        run: |
          npm ci
          npm run build

      - name: Prepare Pull Request Metadata
        id: pr_meta
        run: |
          if [ -f ai-explanation.txt ]; then
            echo "title=chore: automated AI improvements" >> $GITHUB_OUTPUT
            echo "commit=chore: automated AI improvements" >> $GITHUB_OUTPUT
            echo "label=ai-improvements" >> $GITHUB_OUTPUT
            echo "Automated AI-powered improvement pull request generated by GitHub Actions." > pr-body.md
            echo "" >> pr-body.md
            echo "### AI Explanation:" >> pr-body.md
            cat ai-explanation.txt >> pr-body.md
            echo "" >> pr-body.md
            echo "### Validation run:" >> pr-body.md
            echo "- npm run build" >> pr-body.md
          else
            echo "title=chore: automated maintenance updates" >> $GITHUB_OUTPUT
            echo "commit=chore: automated maintenance updates" >> $GITHUB_OUTPUT
            echo "label=dependencies" >> $GITHUB_OUTPUT
            echo "Automated maintenance pull request generated by GitHub Actions." > pr-body.md
            echo "" >> pr-body.md
            echo "Included updates:" >> pr-body.md
            echo "- npm audit fixes applied to lockfile when available" >> pr-body.md
            echo "- npm package lock maintenance updates" >> pr-body.md
            echo "" >> pr-body.md
            echo "### Validation run:" >> pr-body.md
            echo "- npm run build" >> pr-body.md
          fi

      - name: Create pull request for updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: ${{ steps.pr_meta.outputs.commit }}
          branch: "bot/auto-improvements"
          delete-branch: true
          title: ${{ steps.pr_meta.outputs.title }}
          body-path: pr-body.md
          labels: |
            automated
            ${{ steps.pr_meta.outputs.label }}
